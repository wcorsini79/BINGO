<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Bingo Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background-color: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 30px;
            max-width: 800px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 24px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
            text-transform: uppercase;
        }

        .btn-new-game {
            background-color: #667eea;
            color: white;
        }

        .btn-new-game:hover {
            background-color: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-draw {
            background-color: #48bb78;
            color: white;
        }

        .btn-draw:hover {
            background-color: #38a169;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(72, 187, 120, 0.4);
        }

        .btn-clear {
            background-color: #ed8936;
            color: white;
        }

        .btn-clear:hover {
            background-color: #dd6b20;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(237, 137, 54, 0.4);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .game-info {
            display: flex;
            justify-content: space-around;
            align-items: center;
            background-color: #f7fafc;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
            text-align: center;
        }

        .info-box {
            flex: 1;
        }

        .info-box label {
            display: block;
            color: #666;
            font-size: 14px;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .info-box .value {
            font-size: 28px;
            font-weight: bold;
            color: #667eea;
        }

        .bingo-card {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            margin-bottom: 30px;
            background-color: #f7fafc;
            padding: 20px;
            border-radius: 10px;
        }

        .bingo-cell {
            aspect-ratio: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: white;
            border: 2px solid #667eea;
            border-radius: 8px;
            cursor: pointer;
            font-size: 24px;
            font-weight: bold;
            color: #333;
            transition: all 0.2s ease;
            user-select: none;
        }

        .bingo-cell:hover:not(.marked) {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        .bingo-cell.marked {
            background-color: #667eea;
            color: white;
            border-color: #5568d3;
            transform: scale(0.95);
        }

        .bingo-cell.center {
            background-color: #ffd700;
            border-color: #ffc700;
            color: #333;
            font-weight: bold;
        }

        .bingo-cell.center.marked {
            background-color: #ffa500;
            border-color: #ff8c00;
        }

        .drawn-numbers {
            background-color: #f7fafc;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .drawn-numbers h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 18px;
        }

        .numbers-display {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .number-tag {
            background-color: #667eea;
            color: white;
            padding: 8px 12px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
        }

        .winner-message {
            display: none;
            background-color: #48bb78;
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
            animation: pulse 0.5s ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .footer {
            text-align: center;
            color: #666;
            font-size: 14px;
            margin-top: 20px;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 1.8em;
            }

            .container {
                padding: 15px;
            }

            .bingo-card {
                gap: 5px;
                padding: 15px;
            }

            .controls {
                flex-direction: column;
            }

            button {
                width: 100%;
            }

            .game-info {
                flex-direction: column;
                gap: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎉 Digital Bingo 🎉</h1>

        <div class="winner-message" id="winnerMessage">
            🎊 BINGO! YOU WIN! 🎊
        </div>

        <div class="controls">
            <button class="btn-new-game" onclick="newGame()">New Game</button>
            <button class="btn-draw" onclick="drawNumber()">Draw Number</button>
            <button class="btn-clear" onclick="resetCard()">Reset Card</button>
        </div>

        <div class="game-info">
            <div class="info-box">
                <label>Last Number</label>
                <div class="value" id="lastNumber">-</div>
            </div>
            <div class="info-box">
                <label>Numbers Drawn</label>
                <div class="value" id="numbersDrawn">0</div>
            </div>
            <div class="info-box">
                <label>Numbers Marked</label>
                <div class="value" id="numbersMarked">0</div>
            </div>
        </div>

        <div class="drawn-numbers">
            <h3>Drawn Numbers:</h3>
            <div class="numbers-display" id="drawnNumbersList"></div>
        </div>

        <div class="bingo-card" id="bingoCard"></div>

        <div class="footer">
            <p>Click on numbers on your card to mark them. Get 5 in a row (horizontal, vertical, or diagonal) to win!</p>
        </div>
    </div>

    <script>
        const ROWS = 5;
        const COLS = 5;
        const RANGES = {
            B: [1, 15],
            I: [16, 30],
            N: [31, 45],
            G: [46, 60],
            O: [61, 75]
        };

        let bingoCard = [];
        let drawnNumbers = [];
        let markedPositions = new Set();
        let gameOver = false;

        // Initialize the game
        function newGame() {
            bingoCard = generateCard();
            drawnNumbers = [];
            markedPositions.clear();
            gameOver = false;
            document.getElementById('winnerMessage').style.display = 'none';
            renderCard();
            updateGameInfo();
        }

        // Generate a new bingo card
        function generateCard() {
            const card = [];
            const letters = ['B', 'I', 'N', 'G', 'O'];

            for (let col = 0; col < COLS; col++) {
                const letter = letters[col];
                const [min, max] = RANGES[letter];
                const columnNumbers = [];

                for (let i = 0; i < ROWS; i++) {
                    if (letter === 'N' && i === 2) {
                        // Center cell is FREE
                        columnNumbers.push('FREE');
                    } else {
                        let num;
                        do {
                            num = Math.floor(Math.random() * (max - min + 1)) + min;
                        } while (columnNumbers.includes(num));
                        columnNumbers.push(num);
                    }
                }
                card.push(columnNumbers);
            }

            return card;
        }

        // Render the bingo card on the page
        function renderCard() {
            const cardElement = document.getElementById('bingoCard');
            cardElement.innerHTML = '';

            for (let row = 0; row < ROWS; row++) {
                for (let col = 0; col < COLS; col++) {
                    const cell = document.createElement('div');
                    const value = bingoCard[col][row];
                    const isCenter = col === 2 && row === 2;
                    const isMarked = markedPositions.has(`${col}-${row}`);

                    cell.className = 'bingo-cell';
                    if (isCenter) cell.classList.add('center');
                    if (isMarked || isCenter) cell.classList.add('marked');

                    cell.textContent = value;
                    cell.onclick = () => toggleCell(col, row, cell);

                    cardElement.appendChild(cell);
                }
            }
        }

        // Toggle cell marking
        function toggleCell(col, row, element) {
            if (gameOver) return;

            const key = `${col}-${row}`;
            const value = bingoCard[col][row];

            // Don't allow unmarking the free space or toggling based on drawn numbers
            if (value === 'FREE') return;

            if (markedPositions.has(key)) {
                markedPositions.delete(key);
                element.classList.remove('marked');
            } else {
                markedPositions.add(key);
                element.classList.add('marked');
            }

            updateGameInfo();
            checkWin();
        }

        // Draw a random number
        function drawNumber() {
            if (gameOver) return;

            let randomNumber;
            do {
                randomNumber = Math.floor(Math.random() * 75) + 1;
            } while (drawnNumbers.includes(randomNumber));

            drawnNumbers.push(randomNumber);
            document.getElementById('lastNumber').textContent = randomNumber;

            // Auto-mark the number if it exists on the card
            autoMarkNumber(randomNumber);

            updateGameInfo();
            renderDrawnNumbers();
            checkWin();
        }

        // Auto-mark a number on the card if it exists
        function autoMarkNumber(number) {
            for (let col = 0; col < COLS; col++) {
                for (let row = 0; row < ROWS; row++) {
                    if (bingoCard[col][row] === number) {
                        markedPositions.add(`${col}-${row}`);
                    }
                }
            }
            renderCard();
        }

        // Update game information display
        function updateGameInfo() {
            document.getElementById('numbersDrawn').textContent = drawnNumbers.length;
            document.getElementById('numbersMarked').textContent = markedPositions.size;
        }

        // Render the list of drawn numbers
        function renderDrawnNumbers() {
            const listElement = document.getElementById('drawnNumbersList');
            listElement.innerHTML = '';

            drawnNumbers.forEach(num => {
                const tag = document.createElement('span');
                tag.className = 'number-tag';
                tag.textContent = num;
                listElement.appendChild(tag);
            });
        }

        // Check if the player has won
        function checkWin() {
            if (checkRows() || checkCols() || checkDiagonals()) {
                gameOver = true;
                document.getElementById('winnerMessage').style.display = 'block';
            }
        }

        // Check rows for a win
        function checkRows() {
            for (let row = 0; row < ROWS; row++) {
                let count = 0;
                for (let col = 0; col < COLS; col++) {
                    if (markedPositions.has(`${col}-${row}`) || (col === 2 && row === 2)) {
                        count++;
                    }
                }
                if (count === COLS) return true;
            }
            return false;
        }

        // Check columns for a win
        function checkCols() {
            for (let col = 0; col < COLS; col++) {
                let count = 0;
                for (let row = 0; row < ROWS; row++) {
                    if (markedPositions.has(`${col}-${row}`) || (col === 2 && row === 2)) {
                        count++;
                    }
                }
                if (count === ROWS) return true;
            }
            return false;
        }

        // Check diagonals for a win
        function checkDiagonals() {
            // Top-left to bottom-right diagonal
            let count1 = 0;
            for (let i = 0; i < ROWS; i++) {
                if (markedPositions.has(`${i}-${i}`) || (i === 2 && i === 2)) {
                    count1++;
                }
            }
            if (count1 === ROWS) return true;

            // Top-right to bottom-left diagonal
            let count2 = 0;
            for (let i = 0; i < ROWS; i++) {
                if (markedPositions.has(`${COLS - 1 - i}-${i}`) || (COLS - 1 - i === 2 && i === 2)) {
                    count2++;
                }
            }
            if (count2 === COLS) return true;

            return false;
        }

        // Reset the player's marked cells
        function resetCard() {
            markedPositions.clear();
            // Keep the center as marked
            markedPositions.add('2-2');
            renderCard();
            updateGameInfo();
            document.getElementById('winnerMessage').style.display = 'none';
            gameOver = false;
        }

        // Start the game on page load
        window.onload = () => {
            newGame();
        };
    </script>
</body>
</html>
